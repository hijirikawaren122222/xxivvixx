    <script>
        // 腳本數據結構
        const scriptData = {
            intro: [
                { text: "門開章：雨夜・禮物與代價", isTitle: true },
                { text: "雨不是從天空落下，而是從地底、牆縫、你的骨頭縫隙裡滲出來。" },
                { text: "你已經在這條石板路上走了很久，久到分不清自己是醒著還是在做夢。每一次呼吸，肺裡都像灌進了<span class='highlight-green'>黑色的水銀</span>。" },

                { text: "第二樣你從未見過：一個<span class='highlight-gold'>黑色蕾絲眼罩</span>。它輕得像霧，摸起來卻有冰涼的觸感，彷彿剛從某個死去的人的臉上取下來。" },

                { text: "但你聞到了酒香、花香、以及某種時間靜止之後才會產生的、像舊書頁一樣的氣氣。" },

                { text: "<span class='highlight-gold'>（遊戲進入大廳中央主場景，時間凍結於 11:59）</span>", isEnd: true }

            choice2: [

                { text: "雨水像是突然有了生命，它們纏住你的腳踝，試圖把你拉回來。你踢開它們，拚命奔跑。那座建築的光芒在身後迅速縮小，變成一個針尖大的金色斑點。" },

        let currentPhase = "intro"; 
        let currentIndex = 0;
        let isWaitingForChoice = false;

        const storyWrapper = document.getElementById("storyWrapper");
        const choiceContainer = document.getElementById("choiceContainer");
        const clickHint = document.getElementById("clickHint");
        const fadeOverlay = document.getElementById("fadeOverlay");
        const gameOverText = document.getElementById("gameOverText");
        const gameContainer = document.getElementById("gameContainer");

        // 初始化遊戲
        function initGame() {
            currentPhase = "intro";
            currentIndex = 0;
            isWaitingForChoice = false;
            storyWrapper.innerHTML = "";
            choiceContainer.innerHTML = "";
            choiceContainer.style.display = "none";
            clickHint.style.display = "block";
            fadeOverlay.classList.remove("blackout");
            gameOverText.classList.remove("show");
            gameContainer.style.pointerEvents = "auto";
            
            showNextParagraph();
        }

        // 推進文字
        function advanceText() {
            if (isWaitingForChoice) return; // 等待選擇中，不推進
            showNextParagraph();
        }

        // 渲染下一段文字
        function showNextParagraph() {
            const currentLines = scriptData[currentPhase];

            if (currentIndex < currentLines.length) {
                const lineData = currentLines[currentIndex];

                // 處理特殊的劇情黑幕轉場
                if (lineData.isSpecial && lineData.text === "TRIGGER_BLACKOUT") {
                    triggerBadEnd();
                    return;
                }

                // 清除上一段，只保留當前段落，維持簡潔明瞭的畫面
                storyWrapper.innerHTML = "";

                const p = document.createElement("div");
                p.className = "story-paragraph";
                if (lineData.isTitle) {
                    p.style.fontSize = "16pt";
                    p.style.textAlign = "center";
                    p.style.color = "#dfb76c";
                    p.style.marginBottom = "50px";
                }
                p.innerHTML = lineData.text;
                storyWrapper.appendChild(p);

                // 強制瀏覽器重繪以觸發 CSS 淡入動畫
                setTimeout(() => {
                    p.classList.add("visible");
                }, 50);

                currentIndex++;

                // 如果是分支一的終點，隱藏點擊提示
                if (lineData.isEnd) {
                    clickHint.style.display = "none";
                }
            } else {
                // 當前階段文字播畢
                if (currentPhase === "intro") {
                    showChoices();
                }
            }
        }

        // 顯示路線選擇按鈕
        function showChoices() {
            isWaitingForChoice = true;
            clickHint.style.display = "none";
            
            choiceContainer.innerHTML = `
                <button class="choice-button" onclick="selectRoute('choice1', event)">
                    【選擇一：掩上黑色蕾絲眼罩，閉上雙眼，走入宴會】
                </button>
                <button class="choice-button" onclick="selectRoute('choice2', event)">
                    【選擇二：拋下所有東西——信函與眼罩，轉身逃入雨中】
                </button>
            `;
            choiceContainer.style.display = "block";
        }

        // 玩家選擇分支
        function selectRoute(phase, event) {
            event.stopPropagation(); // 防止點擊事件冒泡觸發 advanceText
            currentPhase = phase;
            currentIndex = 0;
            isWaitingForChoice = false;
            
            choiceContainer.style.display = "none";
            clickHint.style.display = "block";
            storyWrapper.innerHTML = "";
            
            showNextParagraph();
        }

        // 觸發選擇二的死亡結局
        function triggerBadEnd() {
            gameContainer.style.pointerEvents = "none"; // 鎖定點擊
            clickHint.style.display = "none";
            fadeOverlay.classList.add("blackout");
            
            setTimeout(() => {
                gameOverText.classList.add("show");
            }, 2000);
        }

        // 重新開始遊戲
        function restartGame(event) {
            event.stopPropagation();
            initGame();
        }

        // 網頁載入後執行
        window.onload = initGame;
    </script>

"""
