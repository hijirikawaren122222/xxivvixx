<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>11:59 - 命運的序幕｜VIXX 文字解謎遊戲</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #0b0812;
            font-family: 'Georgia', 'Times New Roman', '宋體', serif;
            color: #ece4d7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            max-width: 750px;
            width: 100%;
            background: rgba(10, 8, 18, 0.92);
            border-radius: 28px;
            border: 1px solid #c6a43b;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6), inset 0 0 8px rgba(198,164,59,0.2);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }
        .game-text {
            padding: 26px 24px;
            min-height: 380px;
            max-height: 480px;
            overflow-y: auto;
            background: rgba(0,0,0,0.45);
            font-size: 1.02rem;
            line-height: 1.55;
            text-shadow: 0 1px 1px black;
            border-bottom: 1px solid #c6a43b;
        }
        .game-text p {
            margin: 0 0 12px 0;
        }
        .game-text hr {
            border-color: #c6a43b55;
            margin: 14px 0;
        }
        .badge {
            background: #c6a43b22;
            border-left: 3px solid #c6a43b;
            padding: 6px 12px;
            font-family: monospace;
            margin: 12px 0;
            font-size: 0.85rem;
        }
        .game-actions {
            padding: 20px 24px;
            background: #0c0a14;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid #2a2335;
        }
        button {
            background: #1e1a2a;
            border: 1px solid #c6a43b;
            color: #f5ecd9;
            font-family: 'Segoe UI', 'Georgia', monospace;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 7px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        button:hover {
            background: #c6a43b;
            color: #0b0812;
            border-color: #ffdfa5;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(1px);
        }
        .reset-btn {
            background: #2c1a28;
            border-color: #a26a7a;
        }
        .reset-btn:hover {
            background: #a26a7a;
            color: #1c0f18;
        }
        .grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .grid-cell {
            background: #1e182a;
            border: 1px solid #c6a43b;
            border-radius: 12px;
            padding: 12px 4px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        .grid-cell:hover {
            background: #c6a43b;
            color: black;
        }
        .constellation-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .game-text::-webkit-scrollbar {
            width: 5px;
        }
        .game-text::-webkit-scrollbar-track {
            background: #1a1522;
        }
        .game-text::-webkit-scrollbar-thumb {
            background: #c6a43b;
            border-radius: 10px;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 10px;
            color: #6a5a4a;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="game-text" id="gameText"></div>
    <div class="game-actions" id="gameActions"></div>
    <footer>Κήρ · 命運注視著永恆的11:59</footer>
</div>

<script>
    // ------------------- 遊戲狀態 -------------------
    let game = {
        scene: "start",    // start, hall, puzzle1, puzzle2, puzzle3, final, ending
        past: false,
        present: false,
        future: false,
        // 輔助旗標
        extraMsgShown: false
    };

    // 輔助函數：更新畫面
    function updateUI() {
        const textDiv = document.getElementById("gameText");
        const actionsDiv = document.getElementById("gameActions");
        if (!textDiv || !actionsDiv) return;

        // 根據場景渲染
        switch (game.scene) {
            case "start": renderStart(textDiv, actionsDiv); break;
            case "hall": renderHall(textDiv, actionsDiv); break;
            case "puzzle1": renderPuzzle1(textDiv, actionsDiv); break;
            case "puzzle2": renderPuzzle2(textDiv, actionsDiv); break;
            case "puzzle3": renderPuzzle3(textDiv, actionsDiv); break;
            case "final": renderFinal(textDiv, actionsDiv); break;
            case "ending": renderEnding(textDiv, actionsDiv); break;
            default: renderStart(textDiv, actionsDiv);
        }
    }

    // 重置遊戲
    function resetGame() {
        game = {
            scene: "start",
            past: false,
            present: false,
            future: false,
            extraMsgShown: false
        };
        updateUI();
    }

    // 通用失敗結局 (死亡或永恆囚禁)
    function gameOver(reason, fromScene) {
        const textDiv = document.getElementById("gameText");
        textDiv.innerHTML = `<p style="color:#e6b8b8;">❌ ${reason}</p><p>命運之線斷裂，你成為宴會中的一具蠟像，永世困於11:59……</p>`;
        const actionsDiv = document.getElementById("gameActions");
        actionsDiv.innerHTML = `<button class="reset-btn" id="gameOverReset">♾️ 重新編織命運</button>`;
        document.getElementById("gameOverReset")?.addEventListener("click", resetGame);
        game.scene = "ending";
    }

    // ------------------- 序章 -------------------
    function renderStart(container, actions) {
        container.innerHTML = `
            <p>雨，下不盡的雨。</p>
            <p>你在這場突如其來的暴雨中狂奔，冰冷的雨水模糊了你的視線。突然，一個高大的黑影攔住了你的去路。等黑影如煙霧般消散時，你的手中憑空多了一封沉甸甸的信件——那是一封蓋著黃金神聖徽印的邀請函，邀請你參加一場「神明的宴會」。</p>
            <p>你抬頭，一棟古老奢華的建築就在暴雨中靜靜佇立，大門微啟，裡面透出溫暖卻詭異的金光。</p>
        `;
        actions.innerHTML = `
            <button id="acceptBtn">🚪 推開宴會大門，走入其中</button>
            <button id="rejectBtn">🌩️ 撕毀邀請函，轉身逃回家中</button>
        `;
        document.getElementById("acceptBtn")?.addEventListener("click", () => {
            game.scene = "hall";
            updateUI();
        });
        document.getElementById("rejectBtn")?.addEventListener("click", () => {
            container.innerHTML = `<p>你以為你能逃掉。但當你轉身的瞬間，耳邊突然響起一陣震耳欲聾的雷鳴。四周的暴雨瞬間化為血紅，一聲威嚴而冰冷的低笑在虛空中震盪：「可憐的人類，你躲得過這場宴會，卻躲不過我為你布下的其餘九十九個計謀。」你的意識瞬間被雷火吞噬，陷入無盡的黑暗。</p><p style="color:#c6a43b;">【結局：神明的注視】</p>`;
            actions.innerHTML = `<button class="reset-btn" id="resetReject">🌑 重新開始</button>`;
            document.getElementById("resetReject")?.addEventListener("click", resetGame);
        });
    }

    // ------------------- 宴會廳 (主場景) -------------------
    function renderHall(container, actions) {
        let pointerStatus = `【時間發條】${game.past ? '⏳過去✓' : '⏳過去✗'}  ${game.present ? '⌛現在✓' : '⌛現在✗'}  ${game.future ? '⏰未來✓' : '⏰未來✗'}`;
        container.innerHTML = `
            <p>當你跨入大門，身後的暴雨聲戛然而止。</p>
            <p>眾神宴會廳華美而詭異，但所有賓客像蠟像般凍結。大廳中央巨大的純金時鐘，指針死死卡在<strong>11:59</strong>。</p>
            <p>你必須解開三個神明的謎題，取得三枚「時間發條」，才能推動命運。</p>
            <div class="badge">${pointerStatus}</div>
            <p>——你可以觀察周圍的線索，或直接前往三位神明的領域——</p>
        `;
        actions.innerHTML = `
            <button id="observeHall">📜 環視宴會廳線索</button>
            <button id="gotoPuzzle1">⚖️ 前往偏廳 · 赫耳墨斯與九宮幻方</button>
            <button id="gotoPuzzle2">🍷 前往吧檯 · 狄奧尼索斯與毒酒陣</button>
            <button id="gotoPuzzle3">🌌 前往死角 · 阿基里斯與黃道星盤</button>
            <button class="reset-btn" id="resetHallBtn">🔄 重新開始</button>
        `;

        document.getElementById("observeHall")?.addEventListener("click", () => {
            appendMsgInHall("你靜靜掃視大廳：倒立的赫耳墨斯、被縛的普羅米修斯、持杯的酒神、敲擊密碼的女人、腳踝纏繃帶的阿基里斯、空蕩的宙斯座位……金色時鐘散發微光，等待著指針轉動。");
        });
        document.getElementById("gotoPuzzle1")?.addEventListener("click", () => {
            if (!game.past) game.scene = "puzzle1";
            else appendMsgInHall("過去發條已被取走，偏廳不再有回應。");
            updateUI();
        });
        document.getElementById("gotoPuzzle2")?.addEventListener("click", () => {
            if (!game.present) game.scene = "puzzle2";
            else appendMsgInHall("現在發條已收入囊中，吧檯的酒神雕像歸於寂靜。");
            updateUI();
        });
        document.getElementById("gotoPuzzle3")?.addEventListener("click", () => {
            if (!game.future) game.scene = "puzzle3";
            else appendMsgInHall("未來發條已被你掌握，阿基里斯的結界徹底消散。");
            updateUI();
        });
        document.getElementById("resetHallBtn")?.addEventListener("click", resetGame);
    }

    function appendMsgInHall(msg) {
        const textDiv = document.getElementById("gameText");
        const p = document.createElement("p");
        p.style.color = "#c9bd97";
        p.style.fontStyle = "italic";
        p.innerHTML = `✦ ${msg}`;
        textDiv.appendChild(p);
        textDiv.scrollTop = textDiv.scrollHeight;
    }

    // ------------------- 謎題一：倒置九宮盲棋 (三階幻方邏輯) -------------------
    function renderPuzzle1(container, actions) {
        container.innerHTML = `
            <p><strong>⚖️ 倒置偏廳 · 赫耳墨斯的九宮盲棋</strong></p>
            <p>重力顛倒，赫耳墨斯倒立懸浮。天花板上刻著一個九宮格，只有兩個黃金棋子：</p>
            <p>📍 左上角 (位置1) — 燃燒的火種<br>📍 正中央 (位置5) — 黃金權杖</p>
            <p>牆上血字：「火種自天界墜落凡塵，其軌跡必經由白晝、黃昏與黑夜。偷盜者居於起點，引路者居於終點。當九宮的橫、列、對角線之『神聖命數』歸於完全相同之時，將象徵死亡與代價的冥河銀幣置於引路者的腳下，方能開啟過去的大門。」</p>
            <p><em>三階幻方：每行、每列、對角線相加皆為15。起點=1(火種)，中央=5，請推理「引路者」(赫耳墨斯象徵的終點)應在何處？</em></p>
            <div class="grid-3x3" id="magicGrid"></div>
            <p style="font-size:0.85rem;">🔍 提示：幻方規則下，右下角數字必為9，代表終結與冥界引導。</p>
            <button id="backHallP1">↩️ 返回宴會廳</button>
        `;

        // 建立九宮格按鈕
        const gridDiv = document.getElementById("magicGrid");
        if (gridDiv) {
            gridDiv.innerHTML = "";
            for (let i = 1; i <= 9; i++) {
                const cell = document.createElement("div");
                cell.className = "grid-cell";
                cell.textContent = `位置 ${i}`;
                cell.dataset.pos = i;
                cell.addEventListener("click", () => {
                    // 只有位置9正確
                    if (i === 9) {
                        game.past = true;
                        appendMsgInPuzzle("✨ 冥河銀幣在右下角綻放幽光，赫耳墨斯雙蛇杖指向地面，裂開的地磚中浮現【過去的發條】！");
                        game.scene = "hall";
                        updateUI();
                    } else {
                        gameOver("你將銀幣放入錯誤的格子，九宮格瞬間碎裂，你被顛倒的重力絞碎。", "puzzle1");
                    }
                });
                gridDiv.appendChild(cell);
            }
        }
        document.getElementById("backHallP1")?.addEventListener("click", () => {
            game.scene = "hall";
            updateUI();
        });
    }

    function appendMsgInPuzzle(msg) {
        const textDiv = document.getElementById("gameText");
        const p = document.createElement("p");
        p.style.color = "#d4bc7a";
        p.innerHTML = `✨ ${msg}`;
        textDiv.appendChild(p);
        textDiv.scrollTop = textDiv.scrollHeight;
    }

    // ------------------- 謎題二：十四行詩毒酒陣 -------------------
    function renderPuzzle2(container, actions) {
        container.innerHTML = `
            <p><strong>🍇 吧檯 · 狄奧尼索斯的十四行詩毒酒陣</strong></p>
            <p>黑色玫瑰鋪滿吧檯，酒神傾倒酒瓶，女人持杯凍結。七個金樽從左到右刻著古希臘字母：<strong>α, β, γ, δ, ε, ζ, η</strong>，盛著不同顏色的液體。</p>
            <p>木紋浮現血色十四行詩（完整詩文）：<br>
            「傲慢之水居於起點，卻拒絕在α的容器中流淌，<br>
            憤怒之血則在正中央，與命運的δ孤獨地沸揚。<br>
            色慾的深紫不與暴食共享，亦不屑與懶惰同席安躺，<br>
            貪婪的暗藍，被夾在色慾與嫉妒的長廊中央。<br>
            暴食與懶惰在末端聯手，將秘密埋葬，<br>
            嫉妒如慘綠般陰冷，色慾則泛著誘惑的深紫，<br>
            那抹深紫，正是讓她與你墜入愛河的蜜糖。<br>
            貪婪不是ζ，而暴食的順位高於懶惰的死灰，<br>
            唯有將那杯「不居於兩端、不與暴食相鄰」的深紫，注入摯愛的杯盞。」</p>
            <p><strong>請選擇正確的酒樽：</strong></p>
            <div style="display:flex; flex-wrap:wrap; gap:8px; margin:12px 0;">
                ${['α', 'β', 'γ', 'δ', 'ε', 'ζ', 'η'].map(l => `<button class="wineBtn" data-letter="${l}">🍷 金樽 ${l}</button>`).join('')}
            </div>
            <button id="backHallP2">↩️ 返回宴會廳</button>
        `;
        // 正確答案: ζ (第二個樽，位置2對應字母逆序排列 => ζ)
        document.querySelectorAll('.wineBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const letter = e.target.dataset.letter;
                if (letter === 'ζ') {
                    game.present = true;
                    appendMsgInPuzzle("✨ 你將深紫色瓊漿滴入女人杯中，她眼眸燃起妖異紅光，對你一笑，掌心落入【現在的發條】！你無可自拔地愛上了她。");
                    game.scene = "hall";
                    updateUI();
                } else {
                    gameOver(`你選了金樽 ${letter}，毒酒腐蝕靈魂，你化為宴會廳中第七具蠟像。`, "puzzle2");
                }
            });
        });
        document.getElementById("backHallP2")?.addEventListener("click", () => {
            game.scene = "hall";
            updateUI();
        });
    }

    // ------------------- 謎題三：阿基里斯的斯堤克斯黃道星盤 -------------------
    function renderPuzzle3(container, actions) {
        container.innerHTML = `
            <p><strong>🌊 冰冷死角 · 阿基里斯與黃道星盤</strong></p>
            <p>英雄阿基里斯按劍而立，冥河水汽凝結成冰界。青銅星盤懸浮半空，刻滿十二星座符號。</p>
            <p>星盤邊緣預言：「半神之軀，其命運始於雙子，困於巨蟹，終結於黃道之尾。然其母親以逆行之法將其浸入冥河，扭轉星辰軌跡。若想破除不死結界，必須將『命運之終』，逆推回靈魂最初墜落的起點。」</p>
            <p><strong>請選擇逆行後真正的「靈魂起點」星座：</strong></p>
            <div class="constellation-buttons" id="constelList"></div>
            <button id="backHallP3" style="margin-top:10px;">↩️ 返回宴會廳</button>
        `;
        const constellations = [
            "白羊座", "金牛座", "雙子座", "巨蟹座", "獅子座", "處女座",
            "天秤座", "天蠍座", "射手座", "摩羯座", "水瓶座", "雙魚座"
        ];
        const constDiv = document.getElementById("constelList");
        if (constDiv) {
            constellations.forEach(c => {
                const btn = document.createElement("button");
                btn.textContent = c;
                btn.style.background = "#1e182a";
                btn.addEventListener("click", () => {
                    // 正確答案：金牛座 (正常終點雙魚座，逆行: 雙子->金牛)
                    if (c === "金牛座") {
                        game.future = true;
                        appendMsgInPuzzle("✨ 星盤鎖定金牛座，冥河黑水碎裂，黑曜石桌崩開，一枚【未來的發條】滾至腳邊。");
                        game.scene = "hall";
                        updateUI();
                    } else {
                        gameOver(`你選擇了${c}，星盤逆轉暴走，阿基里斯的冥界結界將你凍結成永恆冰雕。`, "puzzle3");
                    }
                });
                constDiv.appendChild(btn);
            });
        }
        document.getElementById("backHallP3")?.addEventListener("click", () => {
            game.scene = "hall";
            updateUI();
        });
    }

    // ------------------- 終章：命運指針轉動12:00 + 墜入冥界 -------------------
    function renderFinal(container, actions) {
        container.innerHTML = `
            <p>你回到大廳中央，深吸一口氣，將【過去】、【現在】、【未來】三枚黃金發條依次插入純金時鐘。</p>
            <p>你伸出手，狠狠地將凍結的指針往下一撥——</p>
            <p><strong style="font-size:1.2rem;">喀噠。</strong> 沉重的齒輪咬合，那根死寂的指針，終於從 11:59 狠狠地跳向了 <strong style="color:#c6a43b;">12:00</strong>。</p>
            <p>全場傳來震撼靈魂的巨響。四周空氣像碎裂的玻璃般剝落、崩塌，燈光熄滅，陷入絕對黑暗。</p>
            <p>黑暗中，一隻冰冷顫抖的手死死抓住你——是那個剛剛對你微笑的女人。你反手緊牽住她，只想保護她逃離這裡。</p>
            <p>然而地面塌陷，你們一同墜入無底深淵。暴風咆哮，漆黑荊棘藤蔓將你們纏繞，女人的手被迫脫離你的掌心，她被黑暗吞沒……</p>
            <p style="color:#ab8e5c;">你的意識模糊，而那充滿荊棘的地下深處，冥王的考驗與惡魔之眼的詛咒正冰冷等待著你。</p>
            <hr>
            <p><strong>【TO BE CONTINUED in 《HADES: Fantasy》】</strong></p>
        `;
        actions.innerHTML = `<button class="reset-btn" id="finalReset">🌑 重新開始 · 再次面對命運</button>`;
        document.getElementById("finalReset")?.addEventListener("click", resetGame);
    }

    function renderEnding(container, actions) {
        // 一般死亡結局已經有重置按鈕；這裡不做額外處理
    }

    // 在hall場景檢查是否集齊所有發條 → 自動進入最終章
    function checkAllGears() {
        if (game.scene === "hall" && game.past && game.present && game.future) {
            game.scene = "final";
            updateUI();
        }
    }

    // 劫持 updateUI, 在呼叫前檢查
    const originalUpdate = updateUI;
    window.updateUI = function() {
        if (game.scene === "hall" && game.past && game.present && game.future) {
            game.scene = "final";
        }
        originalUpdate();
    }.bind(this);

    // 啟動
    resetGame();
</script>
</body>
