<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κήρ</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0d10; /* 黑水銀深色底 */
            color: #dcdcdc; /* 霧白文字 */
            font-family: 'Times New Roman', 'Noto Serif TC', 'SimSun', serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 暴雨與死月硫磺光 */
        .ambient-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(86, 179, 162, 0.06) 0%, rgba(11, 13, 16, 0) 100%);
            pointer-events: none;
            z-index: 10;
        }

        /* 初始標題畫面遮罩 */
        .title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0d10;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 2s ease-in-out;
        }

        .title-large {
            font-size: 48pt;
            letter-spacing: 12px;
            color: #dfb76c; /* 神明金 */
            text-shadow: 0 0 20px rgba(223, 183, 108, 0.3);
            margin-bottom: 20px;
        }

        .title-sub {
            font-size: 11pt;
            color: #55585d;
            letter-spacing: 4px;
            animation: pulse 2s infinite;
        }

        /* 遊戲主要容器 */
        .game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px 20px;
            cursor: pointer;
        }

        /* 文字故事區塊 */
        .story-wrapper {
            position: block;
            max-width: 700px;
            margin: 100px auto 0 auto;
            min-height: 320px; 
        }

        .story-paragraph {
            font-size: 13pt;
            line-height: 1.9;
            letter-spacing: 2px;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }

        .story-paragraph.visible {
            opacity: 1;
        }

        /* 特殊著色樣式 */
        .highlight-green { color: #56b3a2; text-shadow: 0 0 5px rgba(86, 179, 162, 0.5); }
        .highlight-gold { color: #dfb76c; text-shadow: 0 0 5px rgba(223, 183, 108, 0.5); }
        .highlight-greek { font-style: italic; color: #a0aab5; border-bottom: 1px dashed #a0aab5; }

        /* 最後轉場行：血紅色強調大字 */
        .highlight-red-large {
            color: #b32f2f;
            font-size: 15pt;
            font-weight: bold;
            text-align: center;
            margin-top: 35px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(179, 47, 47, 0.6);
            line-height: 2;
        }

        /* 點擊提示 */
        .click-hint {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 10pt;
            color: #44474c;
            letter-spacing: 4px;
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.7; }
            100% { opacity: 0.3; }
        }

        /* 選擇肢容器 */
        .choice-container {
            position: block;
            max-width: 650px;
            margin: 15px auto 0 auto; 
            display: none; 
            text-align: center;
            animation: fadeInChoice 1.8s ease-in-out forwards;
        }

        @keyframes fadeInChoice {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .choice-button {
            display: block;
            width: 100%;
            background-color: rgba(15, 18, 22, 0.85);
            border: 1px solid #343a40;
            padding: 18px 25px;
            margin-bottom: 18px;
            color: #b5b9be;
            font-size: 11pt;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: left;
            line-height: 1.6;
        }

        .choice-button:hover {
            border-color: #dfb76c;
            color: #dfb76c;
            background-color: rgba(223, 183, 108, 0.05);
            box-shadow: 0 0 15px rgba(223, 183, 108, 0.1);
        }

        /* 死亡結局全黑遮罩 */
        .fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2.5s ease-in-out;
            z-index: 100;
        }

        .fade-overlay.blackout { opacity: 1; pointer-events: auto; }

        .game-over-text {
            position: absolute;
            top: 45%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14pt;
            color: #ffffff;
            letter-spacing: 6px;
            line-height: 2;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .game-over-text.show { opacity: 1; }

        .restart-btn {
            display: inline-block;
            margin-top: 30px;
            background: none;
            border: 1px solid #dfb76c;
            color: #dfb76c;
            padding: 10px 25px;
            font-size: 10pt;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .restart-btn:hover { background-color: #dfb76c; color: #000; }
    </style>
</head>
<body>

    <div class="title-screen" id="titleScreen" onclick="startGame()">
        <div class="title-large">Κήρ</div>
        <div class="title-sub">（ 點擊開始故事 ）</div>
    </div>

    <div class="ambient-rain"></div>

    <div class="game-container" id="gameContainer" onclick="advanceText()">
        <div class="story-wrapper" id="storyWrapper"></div>
        <div class="choice-container" id="choiceContainer"></div>
        <div class="click-hint" id="clickHint" style="display:none;">【 點擊繼續 】</div>
    </div>

    <div class="fade-overlay" id="fadeOverlay">
        <div class="game-over-text" id="gameOverText">
            命運從不遺忘。<br>
            <button class="restart-btn" onclick="restartGame(event)">重新開始？</button>
        </div>
    </div>

    <script>
        const scriptData = {
            intro: [
                { text: "雨不是從天空落下，而是從地底、牆縫、你的骨頭縫隙裡滲出來。<br>你已經在這條石板路上走了很久，久到分不清自己是醒著還是在做夢。每一次呼吸，肺裡都像灌進了<span class='highlight-green'>黑色的水銀</span>。<br>路燈是死去的月亮。它們發出的光不是黃色，而是<span class='highlight-green'>硫磺般的青綠</span>，把整條街照得像一座沉沒的祭壇。<br>你的衣服濕透了，貼在皮膚上，像第二層正在腐爛的皮。" },
                { text: "然後——你看見他了。<br>一個身影從雨幕中走出來，不是走，更像是雨水把他凝結成人形。他很高，高到不應該存在於人間。他沒有五官，臉上只有一片光滑的黑暗，但你感覺得到他在看你。<br>他伸出手。<br>那隻手穿過你的胸膛，沒有痛，只有一種被掏空的感覺。當他抽回手時，你低頭——自己毫髮傷，但掌心多了一樣東西。<br>不是一樣。是兩樣。" },
                { text: "第一樣你認得：一封黑色的信函。火漆上壓著一隻睜開的眼睛，瞳孔深處有<span class='highlight-gold'>金色的火焰</span>在燃燒。那是邀請函，邀請你參加一場「神明的宴會」。<br>第二樣你從未見過：一個<span class='highlight-gold'>黑色蕾絲眼罩</span>。它輕得像霧，摸起來卻有冰涼的觸感，彷彿剛從某個死去的人的臉上取下來。眼罩的內側，用銀線繡著一行極小的古希臘文——你勉強辨認出幾個字：<br><span class='highlight-greek'>「閉上凡人的眼，才能看見神的真實。」</span>" },
                { text: "那個人形的雨水已經消失了。只剩下你和這兩樣東西，站在暴雨中央。<br>不遠處，一棟建築從黑暗中浮現。它原本並不在那裡——或者它一直在，只是你的肉眼看不見。大門微啟，裡面透出溫暖卻詭異的<span class='highlight-gold'>金光</span>，像一隻半睜的獸瞳。<br>雨水落在眼罩上，沒有濡濕，反而像被吞噬了。" },
                { text: "你知道，這是一個選擇。或許是這輩子唯一真正自由的選擇。" }
            ],
            choice1: [
                { text: "你猶豫了很久。雨水在你的腳邊匯成淺淺的水窪，倒映著那扇發光的門。<br>終於，你舉起那隻眼罩。蕾絲貼上你的皮膚，冰涼，像死者的親吻。你把絲帶繞過後腦，繫緊。<br>黑暗降臨。不是普通的黑暗——是一種有重量的黑暗，壓在你的眼皮上，壓在你的聽覺上，壓在你的靈魂上。<br>你閉上眼。<br>然後，你聽見門在自己面前敞開的聲音。不是吱呀作響，而是像水面破開一個洞，所有的聲音都被吸進那個洞裡。<br>你跨出一步。" },
                { text: "——沒有踩到地板。你踩到了虛空。<br>但虛空接住了你。<br>當你再次睜開眼時，你已經站在一座巨大宴會廳的正中央。<br>你沒有經過大門。你甚至不確定自己是不是還活著。<br>但你聞到了酒香、花香、以及某種時間靜止之後才會產生的、像舊書頁一樣的氣味。<br><div class='highlight-red-large'>宴會開始了。或者說，它從未開始，也從未結束。</div>", isNextPage: true }
            ],
            choice2: [
                { text: "你的手指一鬆。<br>邀請函和眼罩同時掉進地面的水窪裡。它們沒有沉下去，而是浮在水面上，像兩隻死去的蝴蝶。<br>你轉身就跑。<br>雨水像是突然有了生命，它們纏住你的腳踝，試圖把你拉回來。你踢開它們，拚命奔跑。那座建築的光芒在身後迅速縮小，變成一個針尖大的金色斑點。<br>然後，消失了。" },
                { text: "四周陷入完全的寂靜。<br>雨停了。不是漸漸停，是瞬間停。最後一滴雨懸在半空中，凝結成冰珠，然後碎裂。<br>碎裂的聲音變成了笑聲。<br>低沉、緩慢、從四面八方同時湧來的笑聲。你摀住耳朵，但它們從你的骨頭裡傳進來。<br>「可憐的凡人，」那個聲音說，不帶任何感情，像神在朗讀一份死刑判決書，「你丟得掉信函，丟得掉眼罩，但你丟不掉這條雨夜裡踩過的每一塊石板。你躲過了我為你佈下的第一道門，但命運有千百扇門，而每一扇都已經為你敞開。」<br>你的腳下開始震動。石板裂開，裂縫裡湧出金色的光芒——不是溫暖的光，而是熔爐的光。" },
                { text: "「下一次，你將沒有選擇的機會。因為你已經把自己交還給了我。」<br>你的意識在光芒中消散。" },
                { text: "TRIGGER_BLACKOUT", isSpecial: true }
            ]
        };

        let currentPhase = "intro"; 
        let currentIndex = 0;
        let isWaitingForChoice = false;
        let gameActive = false;
        let textAnimationLock = false; 

        const titleScreen = document.getElementById("titleScreen");
        const storyWrapper = document.getElementById("storyWrapper");
        const choiceContainer = document.getElementById("choiceContainer");
        const clickHint = document.getElementById("clickHint");
        const fadeOverlay = document.getElementById("fadeOverlay");
        const gameOverText = document.getElementById("gameOverText");
        const gameContainer = document.getElementById("gameContainer");

        function startGame() {
            titleScreen.style.pointerEvents = "none";
            titleScreen.style.opacity = "0";
            
            setTimeout(() => {
                titleScreen.style.display = "none";
                gameActive = true; 
                clickHint.style.display = "block";
                showNextParagraph();
            }, 2000);
        }

        function advanceText() {
            if (!gameActive || isWaitingForChoice || textAnimationLock) return;
            showNextParagraph();
        }

        function showNextParagraph() {
            const currentLines = scriptData[currentPhase];

            if (currentIndex < currentLines.length) {
                const lineData = currentLines[currentIndex];

                if (lineData.isSpecial && lineData.text === "TRIGGER_BLACKOUT") {
                    triggerBadEnd();
                    return;
                }

                textAnimationLock = true;
                clickHint.style.opacity = "0.1"; 
                storyWrapper.innerHTML = "";

                const p = document.createElement("div");
                p.className = "story-paragraph";
                p.innerHTML = lineData.text;
                storyWrapper.appendChild(p);

                setTimeout(() => { p.classList.add("visible"); }, 50);
                currentIndex++;

                setTimeout(() => {
                    textAnimationLock = false;
                    clickHint.style.opacity = "1"; 
                }, 1200);

                if (lineData.isNextPage) {
                    setTimeout(() => {
                        clickHint.innerHTML = "【 摘下眼罩 】";
                        // 關鍵修改：將目標換頁檔名更改為 thecloser.html
                        gameContainer.onclick = function() {
                            window.location.href = "thecloser.html";
                        };
                    }, 1200);
                }
            } else {
                if (currentPhase === "intro") {
                    showChoices();
                }
            }
        }

        function showChoices() {
            isWaitingForChoice = true;
            clickHint.style.display = "none";
            
            choiceContainer.style.display = "none";
            choiceContainer.innerHTML = `
                <button class="choice-button" onclick="selectRoute('choice1', event)">
                    掩上黑色蕾絲眼罩，閉上雙眼，走入宴會
                </button>
                <button class="choice-button" onclick="selectRoute('choice2', event)">
                    拋下所有東西——信函與眼罩，轉身逃入雨中
                </button>
            `;
            choiceContainer.style.display = "block";
        }

        function selectRoute(phase, event) {
            event.stopPropagation();
            currentPhase = phase;
            currentIndex = 0;
            isWaitingForChoice = false;
            
            choiceContainer.style.display = "none";
            clickHint.style.display = "block";
            storyWrapper.innerHTML = "";
            
            showNextParagraph();
        }

        function triggerBadEnd() {
            gameContainer.style.pointerEvents = "none";
            clickHint.style.display = "none";
            fadeOverlay.classList.add("blackout");
            
            setTimeout(() => {
                gameOverText.classList.add("show");
            }, 2000);
        }

        function restartGame(event) {
            event.stopPropagation();
            currentPhase = "intro";
            currentIndex = 0;
            isWaitingForChoice = false;
            textAnimationLock = false;
            storyWrapper.innerHTML = "";
            choiceContainer.innerHTML = "";
            choiceContainer.style.display = "none";
            fadeOverlay.classList.remove("blackout");
            gameOverText.classList.remove("show");
            gameContainer.style.pointerEvents = "auto";
            
            gameContainer.onclick = advanceText;
            clickHint.innerHTML = "【 點擊繼續 】";
            
            titleScreen.style.pointerEvents = "auto"; 
            titleScreen.style.display = "flex";
            setTimeout(() => { titleScreen.style.opacity = "1"; }, 50);
            gameActive = false;
        }
    </script>
</body>
</html>
